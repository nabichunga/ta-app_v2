<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TA 자아 상태 진단</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: sans-serif; padding:20px; }
.question { margin-bottom:15px; }
button { padding:10px 20px; margin-top:20px; }
#result { margin-top:30px; }
</style>
</head>

<body>

<h2>TA 자아 상태 진단</h2>

<div>
<b>검사 안내</b><br><br>
• 검사명: TA 자아 상태 진단<br>
• 문항 수: 총 50문항<br>
• 소요시간: 약 10분<br><br>

<b>응답 방법</b><br>
각 문항을 읽고 자신과 얼마나 일치하는지 선택하세요.<br><br>

5점 척도<br>
- 매우 그렇다 (5)<br>
- 그렇다 (4)<br>
- 보통 (3)<br>
- 아니다 (2)<br>
- 전혀 아니다 (1)<br><br>

<b>유의사항</b><br>
- 객관적으로 응답해주세요<br>
- ‘되고 싶은 모습’이 아닌 ‘실제 나’ 기준으로 선택하세요
</div>

<hr>

<form id="quiz"></form>

<button onclick="calculate()">결과 보기</button>

<div id="result"></div>

<canvas id="chart"></canvas>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyGWV48MwQASq_BSxUJkcO-O9kmwyi6nu0ZUsfU98lgXdta81Hnn9v12PXnoOBeSmuK/exec";

// 50문항 + 유형 매칭 (중요 핵심)
const questions = [
{t:"나는 규칙과 기준을 지키는 것을 중요하게 생각한다",type:"CP"},
{t:"나는 나보다 다른 사람을 먼저 배려하려 한다",type:"NP"},
{t:"나는 말과 행동을 할 때 냉정하고 침착하게 한다",type:"A"},
{t:"나는 감정을 솔직하게 표현한다",type:"FC"},
{t:"나는 다른 사람 기대에 맞추려 한다",type:"AC"},

{t:"나는 어떤 사건에 대해 잘잘못을 가리지 않으면 마음이 불편하다",type:"CP"},
{t:"나는 사람을 챙기는 편이다",type:"NP"},
{t:"나는 논리적이고 객관성을 유지하려고 한다",type:"A"},
{t:"나는 즐거운 분위기를 만든다",type:"FC"},
{t:"나는 갈등을 피하려 한다",type:"AC"},

{t:"나는 책임감이 강하다",type:"CP"},
{t:"나는 봉사활동이 즐겁다",type:"NP"},
{t:"나는 계획 후 실행한다",type:"A"},
{t:"나는 농담을 좋아한다",type:"FC"},
{t:"나는 눈치를 보는 편이다",type:"AC"},

{t:"나는 성격이 급하다",type:"CP"},
{t:"나는 공감과 경청을 잘한다",type:"NP"},
{t:"나는 논리적으로 설명한다",type:"A"},
{t:"나는 감탄사를 잘 쓴다",type:"FC"},
{t:"나는 소극적이다",type:"AC"},

{t:"나는 반드시라는 표현을 자주 쓴다",type:"CP"},
{t:"나는 도움 주는 것을 좋아한다",type:"NP"},
{t:"나는 객관성 유지 노력한다",type:"A"},
{t:"나는 자유로운 표현을 좋아한다",type:"FC"},
{t:"나는 맞춰주는 편이다",type:"AC"},

{t:"나는 옳고 그름을 분명히 한다",type:"CP"},
{t:"나는 부드럽게 대한다",type:"NP"},
{t:"나는 데이터 중심이다",type:"A"},
{t:"나는 즐거움을 추구한다",type:"FC"},
{t:"나는 거절을 잘 못한다",type:"AC"},

{t:"나는 실수에 엄격하다",type:"CP"},
{t:"나는 칭찬을 잘한다",type:"NP"},
{t:"나는 분석적이다",type:"A"},
{t:"나는 장난을 잘한다",type:"FC"},
{t:"나는 관계를 중요시한다",type:"AC"},

{t:"나는 강한 표현을 자주 쓴다",type:"CP"},
{t:"나는 공감하려 노력한다",type:"NP"},
{t:"나는 정리정돈 잘한다",type:"A"},
{t:"나는 춤과 노래 좋아한다",type:"FC"},
{t:"나는 후회에 머문다",type:"AC"},

{t:"나는 내 생각을 관철한다",type:"CP"},
{t:"나는 위로를 잘한다",type:"NP"},
{t:"나는 미래 계획 철저하다",type:"A"},
{t:"나는 재미를 추구한다",type:"FC"},
{t:"나는 결정을 잘 못한다",type:"AC"},

{t:"나는 단점이 먼저 보인다",type:"CP"},
{t:"나는 관대하다",type:"NP"},
{t:"나는 자료 중심으로 말한다",type:"A"},
{t:"나는 감정 표현을 잘 안다",type:"FC"},
{t:"나는 지시받는 것이 편하다",type:"AC"}
];

// 유형 이름
const typeName = {
CP:"통제의 언어",
NP:"배려의 언어",
A:"이성의 언어",
FC:"표현의 언어",
AC:"수용의 언어"
};

// 질문 출력
const form = document.getElementById("quiz");

questions.forEach((q,i)=>{
let html = `<div class="question">
${i+1}. ${q.t}<br>`;
for(let j=5;j>=1;j--){
html += `<label><input type="radio" name="q${i}" value="${j}">${j}</label> `;
}
html += "</div>";
form.innerHTML += html;
});

function calculate(){

let score = {CP:0,NP:0,A:0,FC:0,AC:0};

questions.forEach((q,i)=>{
let val = document.querySelector(`input[name="q${i}"]:checked`);
if(val) score[q.type]+=parseInt(val.value);
});

const sorted = Object.entries(score).sort((a,b)=>b[1]-a[1]);

let resultText = `
<h3>결과</h3>
CP(통제): ${score.CP}<br>
NP(배려): ${score.NP}<br>
A(이성): ${score.A}<br>
FC(표현): ${score.FC}<br>
AC(수용): ${score.AC}<br><br>

<b>주요 유형</b><br>
1위: ${typeName[sorted[0][0]]}<br>
2위: ${typeName[sorted[1][0]]}<br><br>

<b>해석</b><br>
`;

const combo = sorted[0][0] + "-" + sorted[1][0];

const interpretation = {
"CP-A":"원칙과 논리를 중시하는 리더형",
"NP-AC":"배려와 관계 중심형",
"FC-NP":"따뜻하고 활발한 소통형",
"A-CP":"분석과 기준 중심형"
};

resultText += interpretation[combo] || "균형 잡힌 유형입니다";

document.getElementById("result").innerHTML = resultText;

// 그래프
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["CP","NP","A","FC","AC"],
datasets:[{
data:[score.CP,score.NP,score.A,score.FC,score.AC]
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
});

// Google 전송
fetch(scriptURL,{
method:"POST",
body:JSON.stringify(score)
});

}

</script>

</body>
</html>
